<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 44 1280 232" width="1280" height="232">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
    </pattern>
    
    <!-- Background radial glow -->
    <radialGradient id="bg-glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#090d16" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    .font-sans {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .font-mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
  </style>

  <!-- Background layers -->
  <rect x="0" y="0" width="1280" height="320" fill="#090d16" />
  <rect x="0" y="0" width="1280" height="320" fill="url(#bg-glow)" />
  <rect x="0" y="0" width="1280" height="320" fill="url(#grid)" />

  <!-- Left Side: Typography and Branding -->
  <g class="font-sans">
    <!-- MIT Badge -->
    <g transform="translate(80, 60)">
      <rect x="0" y="0" width="94" height="20" rx="10" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1" />
      <text x="47" y="14" font-size="10" font-weight="700" fill="#00f0ff" text-anchor="middle" letter-spacing="1">MIT LICENSE</text>
    </g>

    <!-- Title -->
    <text x="80" y="140" font-size="52" font-weight="800" fill="#ffffff" letter-spacing="-1.5">
      open-compute<tspan fill="#00f0ff">-mcp</tspan>
    </text>

    <!-- Tagline 1 -->
    <text x="80" y="182" font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="0.2">
      computer-use tools over MCP  <tspan fill="#475569"> • </tspan>  keyless  <tspan fill="#475569"> • </tspan>  model-agnostic
    </text>

    <!-- Tagline 2 / Description -->
    <text x="80" y="210" font-size="14" font-weight="400" fill="#64748b">
      Windows desktop automation &amp; safety-gated actions
    </text>
  </g>

  <!-- Right Side: Visual Metaphor -->
  
  <!-- AI Model input connection (from off-screen/left) -->
  <path d="M 600 160 L 676 160" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="4,4" fill="none" />

  <!-- Client Hub (Model Context Protocol client) -->
  <g transform="translate(700, 160)">
    <circle cx="0" cy="0" r="24" fill="#090d16" stroke="#00f0ff" stroke-width="2" />
    <path d="M -24 0 A 24 24 0 0 1 0 -24" stroke="#ffffff" stroke-width="2" stroke-opacity="0.4" fill="none" />
    <circle cx="0" cy="0" r="8" fill="#00f0ff" />
    <!-- Ticks -->
    <line x1="0" y1="-32" x2="0" y2="-28" stroke="#00f0ff" stroke-width="2" />
    <line x1="0" y1="28" x2="0" y2="32" stroke="#00f0ff" stroke-width="2" />
    <line x1="-32" y1="0" x2="-28" y2="0" stroke="#00f0ff" stroke-width="2" />
    <line x1="28" y1="0" x2="32" y2="0" stroke="#00f0ff" stroke-width="2" />
  </g>

  <!-- Connective lines to Sockets -->
  <!-- Top line -->
  <path d="M 700 160 Q 745 130 778 110" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />
  <!-- Middle line (Active) -->
  <path d="M 724 160 L 778 160" stroke="#00f0ff" stroke-width="2.5" fill="none" />
  <!-- Bottom line -->
  <path d="M 700 160 Q 745 190 778 210" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="4,4" fill="none" />

  <!-- Sockets -->
  <!-- Top Socket -->
  <g transform="translate(790, 110)">
    <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#090d16" stroke="#475569" stroke-opacity="0.6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="3" fill="#475569" fill-opacity="0.6" />
  </g>
  
  <!-- Bottom Socket -->
  <g transform="translate(790, 210)">
    <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#090d16" stroke="#475569" stroke-opacity="0.6" stroke-width="1.5" />
    <circle cx="0" cy="0" r="3" fill="#475569" fill-opacity="0.6" />
  </g>

  <!-- Middle Socket (Active Connection) -->
  <g transform="translate(790, 160)">
    <rect x="-12" y="-12" width="24" height="24" rx="6" fill="#090d16" stroke="#00f0ff" stroke-width="2" />
    <circle cx="0" cy="0" r="4" fill="#00f0ff" />
  </g>

  <!-- Line from Socket to Screen -->
  <path d="M 802 160 L 850 160" stroke="#00f0ff" stroke-width="2.5" fill="none" />

  <!-- Desktop Screen Window -->
  <g transform="translate(850, 60)">
    <!-- Shadow -->
    <rect x="4" y="4" width="350" height="200" rx="10" fill="#000000" fill-opacity="0.4" />
    <!-- Window Frame -->
    <rect x="0" y="0" width="350" height="200" rx="10" fill="#0b1329" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" />
    
    <!-- Title Bar -->
    <line x1="0" y1="32" x2="350" y2="32" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    <!-- Window Control Dots -->
    <circle cx="20" cy="16" r="4" fill="#ffffff" fill-opacity="0.2" />
    <circle cx="34" cy="16" r="4" fill="#ffffff" fill-opacity="0.2" />
    <circle cx="48" cy="16" r="4" fill="#ffffff" fill-opacity="0.2" />
    
    <text x="175" y="20" class="font-sans" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">desktop-session</text>

    <!-- Sidebar -->
    <line x1="70" y1="32" x2="70" y2="200" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    <rect x="12" y="52" width="46" height="6" rx="3" fill="#ffffff" fill-opacity="0.15" />
    <rect x="12" y="72" width="46" height="6" rx="3" fill="#ffffff" fill-opacity="0.1" />
    <rect x="12" y="92" width="46" height="6" rx="3" fill="#ffffff" fill-opacity="0.1" />
    <rect x="12" y="112" width="46" height="6" rx="3" fill="#ffffff" fill-opacity="0.1" />

    <!-- Main Content Area -->
    <!-- Address Bar -->
    <rect x="85" y="47" width="250" height="18" rx="4" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    <text x="95" y="60" class="font-mono" font-size="9" fill="#64748b">https://open-compute.org</text>

    <!-- Active Action line (faint projection to cursor) -->
    <path d="M 0 100 L 145 100" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="1.5" stroke-dasharray="3,3" fill="none" />

    <!-- Grid Cards -->
    <!-- Card 1 (Active/Target) -->
    <rect x="85" y="80" width="120" height="40" rx="6" fill="#00f0ff" fill-opacity="0.08" stroke="#00f0ff" stroke-opacity="0.6" stroke-width="1" />
    <rect x="97" y="92" width="50" height="6" rx="3" fill="#00f0ff" fill-opacity="0.8" />
    <rect x="97" y="104" width="80" height="4" rx="2" fill="#00f0ff" fill-opacity="0.4" />

    <!-- Card 2 -->
    <rect x="215" y="80" width="120" height="40" rx="6" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1" />
    <rect x="227" y="92" width="50" height="6" rx="3" fill="#ffffff" fill-opacity="0.2" />
    <rect x="227" y="104" width="70" height="4" rx="2" fill="#ffffff" fill-opacity="0.1" />

    <!-- Bottom Content Card -->
    <rect x="85" y="135" width="250" height="45" rx="6" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" />
    <rect x="97" y="147" width="90" height="6" rx="3" fill="#ffffff" fill-opacity="0.15" />
    <rect x="97" y="161" width="150" height="6" rx="3" fill="#ffffff" fill-opacity="0.05" />

    <!-- Cursor Wave / Ripple -->
    <circle cx="145" cy="100" r="10" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-opacity="0.6" />
    <circle cx="145" cy="100" r="18" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.3" />

    <!-- Mouse Cursor -->
    <g transform="translate(145, 100)">
      <path d="M 0 0 L 12 12 L 5 13 L 8 20 L 5 21 L 2 14 L -2 17 Z" fill="#00f0ff" stroke="#0b1329" stroke-width="1.5" stroke-linejoin="round" />
    </g>

    <!-- Coordinates Label -->
    <text x="160" y="92" class="font-mono" font-size="11" font-weight="600" fill="#00f0ff" opacity="0.9">click(995, 160)</text>
  </g>
</svg>
